<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>极简TXT编辑器</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <button id="backBtn" class="toolbar-btn hidden" title="新建">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <span id="filename" class="filename">未命名.txt</span>
            <div class="toolbar-right">
                <span id="unsavedIndicator" class="unsaved-indicator hidden">*</span>
                <button id="saveBtn" class="toolbar-btn" title="保存">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17,21 17,13 7,13 7,21"/>
                        <polyline points="7,3 7,8 15,8"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 欢迎界面 -->
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-content">
                <svg class="welcome-icon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
                <h1>极简TXT编辑器</h1>
                <p>简洁、快速的文本编辑体验</p>
                <div class="action-buttons">
                    <button id="newFileBtn" class="btn btn-primary">新建文档</button>
                    <button id="openFileBtn" class="btn btn-secondary">打开文件</button>
                </div>
            </div>
        </div>

        <!-- 编辑区域 -->
        <div id="editorContainer" class="editor-container hidden">
            <textarea id="editor" class="editor" placeholder="开始输入..."></textarea>
        </div>

        <!-- 底部操作菜单（移动端） -->
        <div id="bottomMenu" class="bottom-menu hidden">
            <button id="bottomNewBtn" class="bottom-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>新建</span>
            </button>
            <button id="bottomOpenBtn" class="bottom-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span>打开</span>
            </button>
            <button id="bottomSaveBtn" class="bottom-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                </svg>
                <span>保存</span>
            </button>
            <button id="bottomSaveAsBtn" class="bottom-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17,21 17,13 7,13 7,21"/>
                </svg>
                <span>另存</span>
            </button>
        </div>
    </div>

    <!-- 隐藏的file input用于兼容性 -->
    <input type="file" id="fileInput" accept=".txt,text/plain" style="display: none;">

    <script src="js/file-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
